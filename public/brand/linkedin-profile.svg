<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0A0F1A"/>
  <!-- Subtle grid -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="rgba(30,157,217,0.06)" stroke-width="1"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="rgba(30,157,217,0.06)" stroke-width="1"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="rgba(30,157,217,0.06)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="400" stroke="rgba(30,157,217,0.06)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="rgba(30,157,217,0.06)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="rgba(30,157,217,0.06)" stroke-width="1"/>
  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1E9DD9" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#1E9DD9" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#glow)"/>
  <!-- Icon background -->
  <rect x="148" y="100" width="104" height="104" rx="22" fill="#1E9DD9"/>
  <!-- Lightning bolt in icon -->
  <path d="M213 112L192 147H204L200 192L225 155H213L213 112Z" fill="white"/>
  <!-- "Spark" wordmark -->
  <text x="200" y="248" font-family="'Poppins', 'Inter', system-ui, sans-serif" font-weight="800" font-size="52" letter-spacing="-1" fill="white" text-anchor="middle">Spark</text>
  <!-- Tagline -->
  <text x="200" y="278" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="16" letter-spacing="3" fill="rgba(255,255,255,0.45)" text-anchor="middle">AI BOOTCAMP</text>
  <!-- Bottom label -->
  <text x="200" y="348" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="13" fill="rgba(30,157,217,0.8)" text-anchor="middle">by Penterra AI</text>
  <!-- Bottom border accent -->
  <rect x="160" y="358" width="80" height="2" rx="1" fill="#1E9DD9" opacity="0.6"/>
